---
- name: Wait for system to become reachable
  ansible.builtin.wait_for_connection:
    timeout: 60

- name: Now gather facts
  ansible.builtin.setup:

- name: Create a user
  ansible.builtin.user:
    name: speedtest
    uid: 1000
    shell: /bin/bash
    create_home: true
    state: present

- name: Install required packages
  ansible.builtin.package:
    name:
      - podman
      - slirp4netns
      - fuse-overlayfs
      - sqlite3
    update_cache: true
    state: present

- name: Create a network in Podman
  containers.podman.podman_network:
    name: "speedtest_network"

- name: Allow user to start processes after the SSH logout (Linger)
  ansible.builtin.command: "loginctl enable-linger {{ ansible_user }}"
  register: speedtest_linger_check
  changed_when: false

- name: Enable Podman auto-update timer
  ansible.builtin.systemd:
    name: podman-auto-update.timer
    state: started
    enabled: true

- name: Setup Speedtest
  containers.podman.podman_container:
    name: speedtest
    image: lscr.io/linuxserver/speedtest-tracker:latest
    network: "speedtest_network"
    state: present
    labels:
      io.containers.autoupdate: "registry"
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - "/config:/config:Z"
    env:
      PUID: 1000
      PGID: 1000
      APP_KEY: "{{ vault_speedtest_key }}"
      APP_NAME: "Legoland's Speedtest"
      APP_TIMEZONE: "Europe/Madrid"
      APP_URL: "https://speedtest.legoland.tech"
      ASSET_URL: "https://speedtest.legoland.tech"
      DB_CONNECTION: "sqlite"
      DISPLAY_TIMEZONE: "Europe/Madrid"
      PUBLIC_DASHBOARD: "true"
      SPEEDTEST_SCHEDULE: "25 */1 * * *"
      SPEEDTEST_SERVERS: "51486"
    generate_systemd:
      path: "/etc/systemd/system/"
      restart_policy: always
      names: true
      new: true

- name: Ensure service is enabled and running
  ansible.builtin.systemd:
    name: container-speedtest
    state: started
    enabled: true
    daemon_reload: true

- name: Cleanup old exited containers
  containers.podman.podman_prune:
    container: true
    network: true

---
- name: Wait for system to become reachable
  ansible.builtin.wait_for_connection:
    timeout: 60

- name: Now gather facts
  ansible.builtin.setup:

- name: Install required packages
  ansible.builtin.package:
    name:
      - apt-transport-https
      - curl
      - gnupg2
      - ca-certificates
    state: present
    update_cache: true
    cache_valid_time: 3600 # 3,600 seconds = 1 hour

- name: Ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Plex GPG key
  ansible.builtin.get_url:
    url: https://downloads.plex.tv/plex-keys/PlexSign.v2.key
    dest: /etc/apt/keyrings/plexmediaserver.v2.gpg
    mode: '0644'

- name: Add Plex repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/plexmediaserver.v2.gpg]
      https://repo.plex.tv/deb/ public main
    state: present
    filename: plex
    update_cache: true

- name: Install Plex Media Server
  ansible.builtin.package:
    name: plexmediaserver
    state: present

- name: Create service
  ansible.builtin.copy:
    src: plexmediaserver.service
    dest: /lib/systemd/system/plexmediaserver.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd

- name: Ensure service is enabled and running
  ansible.builtin.systemd:
    name: plexmediaserver
    state: started
    enabled: true
    daemon_reload: true

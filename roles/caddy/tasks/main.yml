---
- name: Wait for system to become reachable
  ansible.builtin.wait_for_connection:
    timeout: 60

- name: Now gather facts
  ansible.builtin.setup:

- name: Install required packages
  ansible.builtin.package:
    name:
      - apt-transport-https
      - curl
      - gnupg2
      - ca-certificates
    state: present
    update_cache: true
    cache_valid_time: 3600 # 3,600 seconds = 1 hour

- name: Ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Caddy GPG key
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    dest: /etc/apt/keyrings/caddy.asc
    mode: '0644'

- name: Add Caddy repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/caddy.asc]
      https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main
    state: present
    filename: caddy
    update_cache: true

- name: Install Caddy
  ansible.builtin.package:
    name: caddy
    state: present

- name: Check if DigitalOcean module already installed
  ansible.builtin.command: caddy list-modules
  register: caddy_modules
  changed_when: false

- name: Add DigitalOcean module to Caddy
  ansible.builtin.command: caddy add-package github.com/caddy-dns/digitalocean
  register: caddy_add_result
  when: "'dns.providers.digitalocean' not in caddy_modules.stdout"
  changed_when: "'Successfully' in caddy_add_result.stdout"
  failed_when:
    - caddy_add_result.rc != 0
    - "'already added' not in caddy_add_result.stderr"
  notify: Restart service

- name: Copy config from template
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "/etc/caddy/Caddyfile"
    owner: root
    group: root
    mode: '0644'
  notify: Restart service

- name: Ensure service is enabled and running
  ansible.builtin.systemd:
    name: caddy
    state: started
    enabled: true
    daemon_reload: true

- name: Download Tailscale GPG key
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/debian/trixie.noarmor.gpg
    dest: /etc/apt/keyrings/tailscale.gpg
    mode: '0644'

- name: Add Tailscale repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/tailscale.gpg]
      https://pkgs.tailscale.com/stable/debian sid main
    state: present
    filename: tailscale
    update_cache: true

- name: Install Tailscale
  ansible.builtin.package:
    name: tailscale
    state: present

- name: Check if Tailscale is already authenticated
  ansible.builtin.command: tailscale status
  register: caddy_tailscale_status
  failed_when: false
  changed_when: false

- name: Authenticate and Bring Tailscale Up
  ansible.builtin.command: tailscale up --authkey={{ vault_tailscale_key }}
  when: caddy_tailscale_status.rc != 0
  register: caddy_tailscale_up_result
  changed_when: caddy_tailscale_up_result.rc == 0

- name: Configure Tailscale options
  ansible.builtin.command: >-
    tailscale set
    --auto-update=true
    --accept-routes=true
    --accept-dns=true
    --advertise-exit-node
    --advertise-routes=10.2.84.0/24
  register: caddy_tailscale_config
  changed_when:
    - "'update' in caddy_tailscale_config.stdout"
    - "caddy_tailscale_config.rc == 0"
  notify: Tailscale reminder

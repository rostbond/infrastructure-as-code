---
- name: Wait for system to become reachable
  ansible.builtin.wait_for_connection:
    timeout: 60

- name: Now gather facts
  ansible.builtin.setup:

- name: Create a user's group
  ansible.builtin.group:
    name: paperless
    gid: 1000
    state: present

- name: Create a user
  ansible.builtin.user:
    name: paperless
    uid: 1000
    group: 1000
    shell: /bin/bash
    create_home: true
    state: present

- name: Install required packages
  ansible.builtin.package:
    name:
      - podman
      - slirp4netns
      - fuse-overlayfs
    update_cache: true
    state: present

- name: Create a network in Podman
  containers.podman.podman_network:
    name: "paperless_network"

- name: Allow user to start processes after the SSH logout (Linger)
  ansible.builtin.command: "loginctl enable-linger {{ ansible_user }}"
  register: paperless_linger_check
  changed_when: false

- name: Enable Podman auto-update timer
  ansible.builtin.systemd:
    name: podman-auto-update.timer
    state: started
    enabled: true

- name: Setup Redis
  containers.podman.podman_container:
    name: paperless-broker
    image: docker.io/library/redis:8
    network: "paperless_network"
    state: present
    labels:
      io.containers.autoupdate: "registry"
    volumes:
      - "/config/redis:/data:Z"
    generate_systemd:
      path: "/etc/systemd/system/"
      restart_policy: always
      names: true
      new: true

- name: Setup Postgres
  containers.podman.podman_container:
    name: paperless-db
    image: docker.io/library/postgres:18
    network: "paperless_network"
    state: present
    labels:
      io.containers.autoupdate: "registry"
    volumes:
      - "/config/postgres:/var/lib/postgresql:Z"
    env:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless
    generate_systemd:
      path: "/etc/systemd/system/"
      restart_policy: always
      names: true
      new: true

- name: Setup Gotenberg
  containers.podman.podman_container:
    name: paperless-gotenberg
    image: docker.io/gotenberg/gotenberg:8.25
    network: "paperless_network"
    state: present
    labels:
      io.containers.autoupdate: "registry"
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
    generate_systemd:
      path: "/etc/systemd/system/"
      restart_policy: always
      names: true
      new: true

- name: Setup Tika
  containers.podman.podman_container:
    name: paperless-tika
    image: docker.io/apache/tika:latest
    network: "paperless_network"
    state: present
    labels:
      io.containers.autoupdate: "registry"
    generate_systemd:
      path: "/etc/systemd/system/"
      restart_policy: always
      names: true
      new: true

- name: Setup Paperless
  containers.podman.podman_container:
    name: paperless-app
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    network: "paperless_network"
    state: created
    labels:
      io.containers.autoupdate: "registry"
    user: "1000:1000"
    ports:
      - "8000:8000"
    volumes:
      - "/data/data:/usr/src/paperless/data:Z"
      - "/data/media:/usr/src/paperless/media:Z"
      - "/data/export:/usr/src/paperless/export:Z"
      - "/data/consume:/usr/src/paperless/consume:Z"
    env:
      PAPERLESS_REDIS: redis://paperless-broker:6379
      PAPERLESS_DBHOST: paperless-db
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://paperless-gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://paperless-tika:9998
      PAPERLESS_ALLOWED_HOSTS: "docs.legoland.tech"
      PAPERLESS_CSRF_TRUSTED_ORIGINS: "https://docs.legoland.tech"
      PAPERLESS_USE_X_FORWARDED_HOST: "true"
      PAPERLESS_USE_X_FORWARDED_PORT: "true"
    generate_systemd:
      path: "/etc/systemd/system/"
      restart_policy: always
      names: true
      new: true
      after:
        - container-paperless-db.service
        - container-paperless-broker.service

- name: Ensure services are enabled and running
  ansible.builtin.systemd:
    name: "container-{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - paperless-db
    - paperless-broker
    - paperless-gotenberg
    - paperless-tika
    - paperless-app

- name: Cleanup old exited containers
  containers.podman.podman_prune:
    container: true
    network: true
